name: Dependabot Auto Approve and Merge

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  dependabot:
    uses: ./.github/workflows/dependabot-auto-merge.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      auto-approve: true
      auto-merge: true
      merge-method: 'squash'
