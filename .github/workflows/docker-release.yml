# reusable workflow
name: Docker Release

on:
  workflow_call:
    inputs:
      projects:
        required: true
        description: 'JSON array of project contexts to release'
        type: string
      version:
        required: true
        description: 'Version of the Docker release'
        type: string
      docker-registry:
        required: false
        description: 'Docker registry to push the Docker image to'
        type: string
      github-registry:
        required: false
        description: 'Whether to push the image to the GitHub registry'
        type: string
      env-file:
        required: false
        description: 'Contents of the ENV file to use during building, should only be used as an exception.'
        type: string
      dockerfile:
        required: false
        description: 'Single Dockerfile path to use for every project'
        type: string
      dockerfiles:
        required: false
        description: 'JSON array of Dockerfile paths matching projects'
        type: string
      docker-paths:
        required: true
        description: 'JSON array of Docker image paths corresponding to each project'
        type: string
      build-contexts:
        required: false
        description: 'Newline-separated extra build contexts to pass to the docker build command'
        type: string
      build-args:
        required: false
        description: 'Newline-separated build args to pass to the docker build command'
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false
jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
    steps:
      - name: Prepare release matrix
        id: prepare
        env:
          PROJECTS: ${{ inputs.projects }}
          DOCKER_PATHS: ${{ inputs.docker-paths }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          DOCKERFILES: ${{ inputs.dockerfiles }}
        run: |
          MATRIX_JSON=$(node <<'NODE'
          const projects = JSON.parse(process.env.PROJECTS);
          const dockerPaths = JSON.parse(process.env.DOCKER_PATHS);
          const singleDockerfile = (process.env.DOCKERFILE || '').trim();
          const dockerfilesInput = (process.env.DOCKERFILES || '').trim();
          const dockerfiles = dockerfilesInput ? JSON.parse(dockerfilesInput) : [];

          if (!Array.isArray(projects) || projects.length === 0) {
            throw new Error('projects must be a non-empty JSON array');
          }

          if (!Array.isArray(dockerPaths) || dockerPaths.length !== projects.length) {
            throw new Error('docker-paths must match the number of projects');
          }

          if (dockerfiles.length > 0 && dockerfiles.length !== projects.length) {
            throw new Error('dockerfiles must match the number of projects');
          }

          const include = projects.map((project, index) => ({
            project,
            docker_path: dockerPaths[index],
            dockerfile: dockerfiles[index] || singleDockerfile || '',
          }));

          process.stdout.write(JSON.stringify({ include }));
          NODE
          )
          echo "matrix=${MATRIX_JSON}" >> "${GITHUB_OUTPUT}"

  release:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    if: ${{ inputs.version != '' }}
    permissions:
      contents: read
      packages: write
    container:
      image: docker:dind
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up environment
        if: ${{ inputs.env-file != '' }}
        env:
          ENV_FILE: ${{ inputs.env-file }}
          PROJECT_DIR: ${{ matrix.project }}
        run: |
          printf '%s' "${ENV_FILE}" > "${PROJECT_DIR}/.env"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Registry (GitHub)
        if: ${{ inputs.github-registry == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build inputs
        id: resolve
        env:
          PROJECT_DIR: ${{ matrix.project }}
          DOCKERFILE_INPUT: ${{ matrix.dockerfile }}
          DOCKER_PATH_INPUT: ${{ matrix.docker_path }}
          VERSION_INPUT: ${{ inputs.version }}
          REGISTRY_INPUT: ${{ inputs.docker-registry }}
        run: |
          validate_path() {
            case "$1" in
              "" ) return 0 ;;
              /* | *".."* | *"//"* ) echo "Invalid path: $1" >&2; exit 1 ;;
            esac
          }

          validate_image_path() {
            if ! printf '%s' "$1" | grep -Eq '^[a-z0-9]+([._/-][a-z0-9]+)*$'; then
              echo "Invalid image path: $1" >&2
              exit 1
            fi
          }

          validate_path "${PROJECT_DIR}"
          validate_path "${DOCKERFILE_INPUT}"
          validate_image_path "${DOCKER_PATH_INPUT}"

          if [ -n "${DOCKERFILE_INPUT}" ]; then
            DOCKERFILE_PATH="${DOCKERFILE_INPUT}"
          elif [ "${PROJECT_DIR}" = "." ]; then
            DOCKERFILE_PATH="./Dockerfile"
          else
            DOCKERFILE_PATH="${PROJECT_DIR}/Dockerfile"
          fi

          {
            echo "context=${PROJECT_DIR}"
            echo "dockerfile=${DOCKERFILE_PATH}"
            echo "ghcr_tags=ghcr.io/${DOCKER_PATH_INPUT}:latest,ghcr.io/${DOCKER_PATH_INPUT}:${VERSION_INPUT}"
          } >> "${GITHUB_OUTPUT}"

          if [ -n "${REGISTRY_INPUT}" ]; then
            echo "custom_tags=${REGISTRY_INPUT}/${DOCKER_PATH_INPUT}:latest,${REGISTRY_INPUT}/${DOCKER_PATH_INPUT}:${VERSION_INPUT}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and Push Docker Image (GitHub)
        if: ${{ inputs.github-registry == 'true' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with: # zizmor: ignore[template-injection] sanitized in the resolve step above
          context: ${{ steps.resolve.outputs.context }}
          file: ${{ steps.resolve.outputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.resolve.outputs.ghcr_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ inputs.build-args }}
          build-contexts: ${{ inputs.build-contexts }}

      - name: Login to Registry (Custom) # zizmor: ignore[secrets-outside-env] caller-owned registry secrets cannot be bound to a shared environment here
        if: ${{ inputs.docker-registry != '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image (Custom)
        if: ${{ inputs.docker-registry != '' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with: # zizmor: ignore[template-injection] sanitized in the resolve step above
          context: ${{ steps.resolve.outputs.context }}
          file: ${{ steps.resolve.outputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.resolve.outputs.custom_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ inputs.build-args }}
          build-contexts: ${{ inputs.build-contexts }}
