# reusable workflow
name: Docker Release

on:
  workflow_call:
    inputs:
      projects:
        required: true
        description: 'Comma-separated list of projects to release'
        type: string
      version:
        required: true
        description: 'Version of the Docker release'
        type: string
      docker-registry:
        required: false
        description: 'Docker registry to push the Docker image to'
        type: string
      github-registry:
        required: false
        description: 'Whether to push the image to the GitHub registry'
        type: string
      env-file:
        required: false
        description: 'Contents of the ENV file to use during building, should only be used as an exception.'
        type: string
      docker-paths:
        required: true
        description: 'Comma-separated list of Docker paths corresponding to each project'
        type: string
      build-contexts:
        required: false
        description: 'Comma-separated extra build contexts to pass to the docker build command'
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ inputs.version != '' }}
    permissions:
      packages: write
    container:
      image: docker:dind
    strategy:
      matrix:
        project: ${{ fromJson(inputs.projects) }}
        docker-path: ${{ fromJson(inputs.docker-paths) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up environment
        if: ${{ inputs.env-file != '' }}
        env:
          ENV_FILE: ${{ inputs.env-file }}
        run: |
          echo "${ENV_FILE}" > ${{ matrix.project }}/.env

      - name: Extract Image Name
        id: extract
        env:
          DOCKER_PATH: ${{ matrix.docker-path }}
        run: |
          # The value is now safely stored in DOCKER_PATH
          input="$DOCKER_PATH"
          result="${input#*/}"
          echo "part=$result" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to Registry (GitHub)
        if: ${{ inputs.github-registry == 'true' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker Tags
        id: docker_tags
        run: |
          if [ "${{ matrix.project }}" = "." ]; then
            echo "TAGS=ghcr.io/gewis/${{ steps.extract.outputs.part }}:latest,ghcr.io/gewis/${{ steps.extract.outputs.part }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "TAGS=ghcr.io/gewis/${{ steps.extract.outputs.part }}/${{ matrix.project }}:latest,ghcr.io/gewis/${{ steps.extract.outputs.part }}/${{ matrix.project }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Build and Push Docker Image (GitHub)
        if: ${{ inputs.github-registry == 'true' }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ${{ matrix.project }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-contexts: ${{ inputs.build-contexts }}

      - name: Login to Registry (Custom)
        if: ${{ inputs.docker-registry != '' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set Custom Docker Tags
        id: custom_docker_tags
        run: |
          if [ "${{ matrix.project }}" = "." ]; then
            echo "TAGS=${{ inputs.docker-registry }}/${{ matrix.docker-path }}:latest,${{ inputs.docker-registry }}/${{ matrix.docker-path }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "TAGS=${{ inputs.docker-registry }}/${{ matrix.docker-path }}/${{ matrix.project }}:latest,${{ inputs.docker-registry }}/${{ matrix.docker-path }}/${{ matrix.project }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Build and Push Docker Image (Custom)
        if: ${{ inputs.docker-registry != '' }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ${{ matrix.project }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-contexts: ${{ inputs.build-contexts }}
