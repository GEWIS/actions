# reusable workflow
name: Docker Release

on:
  workflow_call:
    inputs:
      projects:
        required: true
        description: 'Comma-separated list of projects to release'
        type: string
      version:
        required: true
        description: 'Version of the Docker release'
        type: string
      docker-registry:
        required: false
        description: 'Docker registry to push the Docker image to'
        type: string
      github-registry:
        required: false
        description: 'Whether to push the image to the GitHub registry'
        type: string
      env-file:
        required: false
        description: 'Contents of the ENV file to use during building, should only be used as an exception.'
        type: string
      docker-paths:
        required: true
        description: 'Comma-separated list of Docker paths corresponding to each project'
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ inputs.version != '' }}
    permissions:
      packages: write
    container:
      image: docker:dind
    strategy:
      matrix:
        project: ${{ fromJson(inputs.projects) }}
        docker-path: ${{ fromJson(inputs.docker-paths) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up environment
        if: ${{ inputs.env-file != '' }}
        env:
          ENV_FILE: ${{ inputs.env-file }}
        run: |
          echo "${ENV_FILE}" > ${{ matrix.project }}/.env

      - name: Extract Image Name
        id: extract
        env:
          DOCKER_PATH: ${{ matrix.docker-path }}
        run: |
          # The value is now safely stored in DOCKER_PATH
          input="$DOCKER_PATH"
          result="${input#*/}"
          echo "part=$result" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      - name: Login to Registry (GitHub)
        if: ${{ inputs.github-registry == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker Tags
        id: docker_tags
        run: |
          if [ "${{ matrix.project }}" = "." ]; then
            echo "TAGS=ghcr.io/gewis/${{ matrix.docker-path }}:latest,ghcr.io/gewis/${{ matrix.docker-path }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "TAGS=ghcr.io/gewis/${{ matrix.docker-path }}/${{ matrix.project }}:latest,ghcr.io/gewis/${{ matrix.docker-path }}/${{ matrix.project }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Build and Push Docker Image (GitHub)
        if: ${{ inputs.github-registry == 'true' }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ${{ matrix.project }}/Dockerfile

      - name: Login to Registry (Custom)
        if: ${{ inputs.docker-registry != '' }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set Custom Docker Tags
        id: custom_docker_tags
        run: |
          if [ "${{ matrix.project }}" = "." ]; then
            echo "TAGS=${{ inputs.docker-registry }}/${{ matrix.docker-path }}:latest,${{ inputs.docker-registry }}/${{ matrix.docker-path }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "TAGS=${{ inputs.docker-registry }}/${{ matrix.docker-path }}/${{ matrix.project }}:latest,${{ inputs.docker-registry }}/${{ matrix.docker-path }}/${{ matrix.project }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Build and Push Docker Image (Custom)
        if: ${{ inputs.docker-registry != '' }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ${{ matrix.project }}/Dockerfile
