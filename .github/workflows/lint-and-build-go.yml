# reusable workflowname: Golang Lint and Buildon:  workflow_call:    inputs:      working-directory:        required: false        type: string        default: '.'      go-version:        required: false        type: string        default: '1.24'      artifact-name:        required: false        type: string        description: 'Name of artifact to use'      artifact-path:        required: false        type: string        description: 'Path to place artifact'      prepare-command:        required: false        type: string        description: 'Command to run directly after checkout.'      cleanup-command:        required: false        type: string        description: 'Command to run after the workflow (even if failed).'      format:        type: boolean        description: 'Run go fmt'        default: true      lint:        type: boolean        description: 'Run go vet'        default: true      test:        type: boolean        description: 'Run go test'        default: true      build:        type: boolean        description: 'Build the binary'        default: truejobs:  go-steps:    runs-on: ubuntu-latest    steps:      - name: Checkout        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683        with:          persist-credentials: false      - name: Artifact        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093        with:          name: ${{ inputs.artifact-name }}          path: ${{ inputs.artifact-path }}        if: ${{ inputs.artifact-name != '' }}      - name: Prepare        env:          PREPARE_CMD: ${{ inputs.prepare-command }}        if: ${{ inputs.prepare-command != '' }}        run: bash -c "$PREPARE_CMD"      - name: Setup Go        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5        with:          go-version: ${{ inputs.go-version }}      - name: go fmt        working-directory: ${{ inputs.working-directory }}        run: go fmt ./...        if: ${{ inputs.format }}      - name: go vet        working-directory: ${{ inputs.working-directory }}        run: go vet ./...        if: ${{ inputs.lint }}      - name: go test        working-directory: ${{ inputs.working-directory }}        run: go test ./...        if: ${{ inputs.test }}      - name: go build        working-directory: ${{ inputs.working-directory }}        run: go build ./...        if: ${{ inputs.build }}      - name: Cleanup        env:          CLEANUP_CMD: ${{ inputs.cleanup-command }}        run: bash -c "$CLEANUP_CMD"        if: ${{ inputs.cleanup-command != '' && always() }}