# reusable workflow
name: Docker Release to GHCR

on:
  workflow_call:
    inputs:
      projects:
        required: true
        description: 'JSON array of project contexts to build, e.g. ["app","api"] or ["."].'
        type: string
      version:
        required: true
        description: 'Version tag for the Docker release'
        type: string
      env-file:
        required: false
        description: 'Contents of the .env file to place in each project directory during build'
        type: string
      docker-paths:
        required: true
        description: 'JSON array of Docker paths matching projects, e.g. ["gewis/app","gewis/api"]'
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ inputs.version != '' }}
    permissions:
      packages: write
      contents: read
    container:
      image: docker:dind
    strategy:
      matrix:
        project: ${{ fromJson(inputs.projects) }}
        docker-path: ${{ fromJson(inputs.docker-paths) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up environment
        if: ${{ inputs.env-file != '' }}
        env:
          ENV_FILE: ${{ inputs.env-file }}
        run: |
          echo "${ENV_FILE}" > ${{ matrix.project }}/.env

      - name: Extract image name suffix
        id: extract
        env:
          DOCKER_PATH: ${{ matrix.docker-path }}
        run: |
          input="$DOCKER_PATH"
          result="${input#*/}"
          echo "part=$result" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR tags
        id: tags
        run: |
          if [ "${{ matrix.project }}" = "." ]; then
            echo "TAGS=ghcr.io/gewis/${{ steps.extract.outputs.part }}:latest,ghcr.io/gewis/${{ steps.extract.outputs.part }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "TAGS=ghcr.io/gewis/${{ steps.extract.outputs.part }}/${{ matrix.project }}:latest,ghcr.io/gewis/${{ steps.extract.outputs.part }}/${{ matrix.project }}:${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Build and push to GHCR
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ${{ matrix.project }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
