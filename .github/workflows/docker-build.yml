# reusable workflow
name: Docker Build

on:
  workflow_call:
    inputs:
      projects:
        required: true
        description: 'JSON array of project contexts to build'
        type: string
      docker-registry:
        required: false
        description: 'Docker registry for base images behind authentication'
        type: string
      dockerfile:
        required: false
        description: 'Single Dockerfile path to use for every project'
        type: string
      dockerfiles:
        required: false
        description: 'JSON array of Dockerfile paths matching projects'
        type: string
      env-file:
        required: false
        description: 'Contents of the .env file to place in each project directory during build'
        type: string
      build-args:
        required: false
        description: 'Newline-separated build args to pass to docker build'
        type: string
      build-contexts:
        required: false
        description: 'Newline-separated extra build contexts to pass to docker build'
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
    steps:
      - name: Prepare build matrix
        id: prepare
        env:
          PROJECTS: ${{ inputs.projects }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          DOCKERFILES: ${{ inputs.dockerfiles }}
        run: |
          MATRIX_JSON=$(node <<'NODE'
          const projects = JSON.parse(process.env.PROJECTS);
          const singleDockerfile = (process.env.DOCKERFILE || '').trim();
          const dockerfilesInput = (process.env.DOCKERFILES || '').trim();
          const dockerfiles = dockerfilesInput ? JSON.parse(dockerfilesInput) : [];

          if (!Array.isArray(projects) || projects.length === 0) {
            throw new Error('projects must be a non-empty JSON array');
          }

          if (dockerfiles.length > 0 && dockerfiles.length !== projects.length) {
            throw new Error('dockerfiles must match the number of projects');
          }

          const include = projects.map((project, index) => ({
            project,
            dockerfile: dockerfiles[index] || singleDockerfile || '',
          }));

          process.stdout.write(JSON.stringify({ include }));
          NODE
          )
          echo "matrix=${MATRIX_JSON}" >> "${GITHUB_OUTPUT}"

  dockerize:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    container:
      image: docker:dind
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Login to Registry (Custom) # zizmor: ignore[secrets-outside-env] caller-owned registry secrets cannot be bound to a shared environment here
        if: ${{ inputs.docker-registry != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Resolve build inputs
        id: resolve
        env:
          PROJECT_DIR: ${{ matrix.project }}
          DOCKERFILE_INPUT: ${{ matrix.dockerfile }}
        run: |
          validate_path() {
            case "$1" in
              "" ) return 0 ;;
              /* | *".."* | *"//"* ) echo "Invalid path: $1" >&2; exit 1 ;;
            esac
          }

          validate_path "${PROJECT_DIR}"
          validate_path "${DOCKERFILE_INPUT}"

          if [ -n "${DOCKERFILE_INPUT}" ]; then
            DOCKERFILE_PATH="${DOCKERFILE_INPUT}"
          elif [ "${PROJECT_DIR}" = "." ]; then
            DOCKERFILE_PATH="./Dockerfile"
          else
            DOCKERFILE_PATH="${PROJECT_DIR}/Dockerfile"
          fi

          echo "context=${PROJECT_DIR}" >> "${GITHUB_OUTPUT}"
          echo "dockerfile=${DOCKERFILE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Set up environment
        if: ${{ inputs.env-file != '' }}
        env:
          ENV_FILE: ${{ inputs.env-file }}
          PROJECT_DIR: ${{ steps.resolve.outputs.context }}
        run: |
          printf '%s' "${ENV_FILE}" > "${PROJECT_DIR}/.env"

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with: # zizmor: ignore[template-injection] sanitized in the resolve step above
          context: ${{ steps.resolve.outputs.context }}
          file: ${{ steps.resolve.outputs.dockerfile }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ inputs.build-args }}
          build-contexts: ${{ inputs.build-contexts }}
