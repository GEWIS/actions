# reusable workflow
name: NPM Release

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        description: 'The node version required for the project'
        default: '20.x'
      version:
        required: true
        description: 'Version of the package(s)'
        type: string
      lerna:
        required: false
        description: 'Whether project is a lerna project'
        type: string
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    if: ${{ inputs.lerna != 'true' && inputs.version != '' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        run: npm publish --access public

  publish-npm-lerna:
    runs-on: ubuntu-latest
    if: ${{ inputs.lerna == 'true' && inputs.version != '' }}
    permissions:
      packages: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Git Config
        run: git config user.email 'github-actions@github.com' && git config user.name 'github-actions'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify NPM Authentication
        run: npm whoami

      - name: Lerna Publish
        env:
          VERSION: ${{ inputs.version }}
        run: |
          npx --yes lerna version "$VERSION" --amend --yes
          npx lerna publish from-git --yes

      - name: Push Tags
        run: git push --force-with-lease --follow-tags
