# reusable workflow
name: Versioning

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        description: 'The Node.js version to use for semantic-release'
        type: string
        default: '20.x'
      dry-run:
        required: false
        description: 'Whether to perform versioning without making a release'
        type: string
    outputs:
      next-version:
        description: 'Next version for tagging and releasing'
        value: ${{ jobs.versioning.outputs.next-version }}

jobs:
  versioning:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      next-version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Fetch Release Config
        run: if [ -f package.json ] && grep -q '"@gewis/release-config"' package.json; then npm install @gewis/release-config; fi

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90
        id: semantic
        with:
          dry_run: ${{ inputs.dry-run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version tags
        if: steps.semantic.outputs.new_release_published == 'true' && inputs.dry-run != 'true'
        env:
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "No version found, skipping tag update"
            exit 0
          fi
          
          # Extract major and minor version components
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          
          # Configure git
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          
          # Create or update major and minor version tags
          git tag -f "v$MAJOR" HEAD
          git tag -f "v$MINOR" HEAD
          
          # Push tags with force to update floating version tags
          git push --force origin "v$MAJOR" "v$MINOR"
