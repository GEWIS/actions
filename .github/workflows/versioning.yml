# reusable workflow
name: Versioning

on:
  workflow_call:
    inputs:
      dry-run:
        required: false
        description: 'Whether to perform versioning without making a release'
        type: string
    outputs:
      next-version:
        description: 'Next version for tagging and releasing'
        value: ${{ jobs.versioning.outputs.next-version }}

jobs:
  versioning:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      next-version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Fetch Release Config
        run: if [ -f package.json ] && grep -q '"@gewis/release-config"' package.json; then npm install @gewis/release-config; fi

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90
        id: semantic
        with:
          dry_run: ${{ inputs.dry-run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
