# This example is self-validating inside the GEWIS/actions repository.
# Downstream repositories should replace the local reusable-workflow paths
# with GEWIS/actions/.github/workflows/...@v1.
name: Docker Matrix Release

on:
  push:
    branches:
      - main

jobs:
  versioning:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/versioning.yml
    with:
      node-version: "22.x"

  release:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-release.yml
    needs: versioning
    if: ${{ needs.versioning.outputs.next-version != '' }}
    with:
      projects: '["apps/dashboard","apps/point-of-sale"]'
      docker-paths: '["gewis/sudosos-dashboard","gewis/sudosos-pos"]'
      dockerfiles: '["apps/dashboard/Dockerfile","apps/point-of-sale/Dockerfile"]'
      docker-registry: "abc.docker-registry.gewis.nl"
      version: ${{ needs.versioning.outputs.next-version }}
      env-file: ${{ vars.ENV_FILE_PRODUCTION }}
      build-args: |
        GIT_COMMIT_BRANCH=${{ github.head_ref || github.ref_name }}
        GIT_COMMIT_SHA=${{ github.sha }}
    secrets:
      REGISTRY_USERNAME: ${{ secrets.SVC_GH_ABCEOU_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.SVC_GH_ABCEOU_PWD }}
