# This example is self-validating inside the GEWIS/actions repository.
# Downstream repositories should replace the local reusable-workflow path
# with GEWIS/actions/.github/workflows/lint-and-build-yarn.yml@v1.
name: Lint and build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-lint:
    uses: ./.github/workflows/lint-and-build-yarn.yml
    with:
      node-version: "22.x"
      lint: true
      format: true
      build: true
