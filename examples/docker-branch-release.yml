# This example is self-validating inside the GEWIS/actions repository.
# Downstream repositories should replace the local reusable-workflow path
# with GEWIS/actions/.github/workflows/docker-branch-release.yml@v1.
name: Docker Branch Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  dockerize:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-branch-release.yml
    with:
      projects: '["apps/dashboard","apps/point-of-sale"]'
      docker-paths: '["gewis/sudosos-dashboard","gewis/sudosos-pos"]'
      dockerfiles: '["apps/dashboard/Dockerfile","apps/point-of-sale/Dockerfile"]'
      docker-registry: "abc.docker-registry.gewis.nl"
      env-file: ${{ vars.ENV_FILE_DEVELOPMENT }}
      build-args: |
        GIT_COMMIT_BRANCH=${{ github.head_ref || github.ref_name }}
        GIT_COMMIT_SHA=${{ github.sha }}
    secrets:
      REGISTRY_USERNAME: ${{ secrets.SVC_GH_ABCEOU_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.SVC_GH_ABCEOU_PWD }}
